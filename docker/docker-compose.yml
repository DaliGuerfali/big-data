# -------------------------------------------------------
#  Satellite Tracking Big Data Platform
#  Services: Zookeeper, Kafka, Kafka-UI,
#            Hadoop (NameNode + DataNode),
#            Spark (Master + Worker),
#            Redis, Airflow, Grafana
# ─────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  networks:
    - satellite-net
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    HDFS_NAMENODE_URL: hdfs://namenode:8020
    SPARK_MASTER_URL: spark://spark-master:7077
    # Install docker-py and kafka-python at container startup
    _PIP_ADDITIONAL_REQUIREMENTS: "docker==7.1.0 kafka-python==2.0.2"
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/plugins:/opt/airflow/plugins
    - ../airflow/config:/opt/airflow/config:ro
    - airflow_logs:/opt/airflow/logs
    # Docker socket — lets Airflow exec into sibling containers
    - /var/run/docker.sock:/var/run/docker.sock
  # The Docker socket is owned by root:root (group 0) inside Docker Desktop;
  # add the airflow user to that group so it can connect without sudo.
  group_add:
    - "0"
  depends_on:
    postgres:
      condition: service_healthy

networks:
  satellite-net:
    driver: bridge

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  hadoop_namenode:
  hadoop_datanode:
  redis_data:
  airflow_logs:
  postgres_data:
  grafana_data:

services:

  # ── Zookeeper ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    hostname: zookeeper
    networks:
      - satellite-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    hostname: kafka
    networks:
      - satellite-net
    ports:
      - "9092:9092"       # internal
      - "29092:29092"     # external (host machine)
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168         # 7 days default
      KAFKA_LOG_SEGMENT_BYTES: 1073741824    # 1 GB
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka UI ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - satellite-net
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: satellite-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ── Kafka Topic Initializer ──────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka-init
    networks:
      - satellite-net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/init-topics.sh"]
    volumes:
      - ../scripts/init-topics.sh:/scripts/init-topics.sh:ro

  # ── Hadoop NameNode ──────────────────────────────────────
  namenode:
    build:
      context: ./hadoop
      dockerfile: Dockerfile
    container_name: namenode
    hostname: namenode
    networks:
      - satellite-net
    ports:
      - "9870:9870"   # HDFS Web UI
      - "8020:8020"   # HDFS RPC
    environment:
      HADOOP_NODE_TYPE: namenode
      CLUSTER_NAME: satellite-cluster
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ../config/hadoop:/opt/hadoop/etc/hadoop:ro
      - ../scripts:/scripts:ro
      - ../batch:/opt/batch:ro
    healthcheck:
      test: ["CMD", "hdfs", "dfsadmin", "-safemode", "get"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ── Hadoop DataNode ──────────────────────────────────────
  datanode:
    build:
      context: ./hadoop
      dockerfile: Dockerfile
    container_name: datanode
    hostname: datanode
    networks:
      - satellite-net
    ports:
      - "9864:9864"   # DataNode Web UI
    environment:
      HADOOP_NODE_TYPE: datanode
      CLUSTER_NAME: satellite-cluster
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
      - ../config/hadoop:/opt/hadoop/etc/hadoop:ro
    depends_on:
      namenode:
        condition: service_healthy

  # ── HDFS Initializer ────────────────────────────────────
  hdfs-init:
    build:
      context: ./hadoop
      dockerfile: Dockerfile
    container_name: hdfs-init
    networks:
      - satellite-net
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    volumes:
      - ../config/hadoop:/opt/hadoop/etc/hadoop:ro
      - ../scripts/init-hdfs.sh:/scripts/init-hdfs.sh:ro
    entrypoint: ["/bin/bash", "/scripts/init-hdfs.sh"]

  # -- Spark Master ------------------------------------------
  # Uses the official Apache Spark image (apache/spark).
  # Unlike bitnami, this image requires an explicit command and
  # SPARK_NO_DAEMONIZE so the process stays in the foreground.
  # Conf dir is /opt/spark/conf/ (not /opt/bitnami/spark/conf/).
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    user: root
    networks:
      - satellite-net
    ports:
      - "8081:8080"   # Spark Master Web UI (internal 8080)
      - "7077:7077"   # Spark Master RPC
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ../config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ../streaming:/opt/spark/jobs/streaming:ro
      - ../batch:/opt/spark/jobs/batch:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # -- Spark Worker ------------------------------------------
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    hostname: spark-worker
    user: root
    networks:
      - satellite-net
    ports:
      - "8082:8081"   # Spark Worker Web UI (internal 8081)
    depends_on:
      spark-master:
        condition: service_healthy
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: "2g"
      SPARK_WORKER_CORES: "2"
    volumes:
      - ../config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ../streaming:/opt/spark/jobs/streaming:ro
      - ../batch:/opt/spark/jobs/batch:ro

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    hostname: redis
    networks:
      - satellite-net
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Postgres (Airflow backend) ───────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    hostname: postgres
    networks:
      - satellite-net
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow Init ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@satellite.local \
          --password admin
    restart: "no"

  # ── Airflow Webserver ────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    ports:
      - "8083:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Airflow Scheduler ────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    hostname: grafana
    networks:
      - satellite-net
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Satellite API (FastAPI) ───────────────────────────────
  satellite-api:
    image: python:3.11-slim
    container_name: satellite-api
    hostname: satellite-api
    networks:
      - satellite-net
    ports:
      - "8084:8084"
    working_dir: /app
    command: >
      bash -c "pip install --quiet fastapi uvicorn[standard] redis httpx &&
               python -m uvicorn serving.api.main:app --host 0.0.0.0 --port 8084"
    environment:
      REDIS_URL: redis://redis:6379
      HDFS_NAMENODE_URL: hdfs://namenode:8020
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ../:/app:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Kafka-to-Redis Bridge ─────────────────────────────────
  kafka-redis-bridge:
    image: python:3.11-slim
    container_name: kafka-redis-bridge
    hostname: kafka-redis-bridge
    networks:
      - satellite-net
    working_dir: /app
    command: >
      bash -c "pip install --quiet kafka-python redis &&
               python -m serving.bridge.kafka_redis_bridge"
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ../:/app:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
