# ── Spark Master ─────────────────────────────────────────
spark.master                        spark://spark-master:7077

# ── Hadoop / HDFS Integration ────────────────────────────
spark.hadoop.fs.defaultFS           hdfs://namenode:8020

# ── Kafka Integration (Structured Streaming) ─────────────
spark.jars.packages                 org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,\
                                    org.apache.kafka:kafka-clients:3.5.1,\
                                    org.apache.hadoop:hadoop-client:3.3.6,\
                                    org.apache.spark:spark-streaming-kafka-0-10_2.12:3.5.1

# ── Serialization ────────────────────────────────────────
spark.serializer                    org.apache.spark.serializer.KryoSerializer
spark.kryo.unsafe                   false

# ── Memory & Cores ───────────────────────────────────────
spark.executor.memory               1g
spark.executor.cores                1
spark.driver.memory                 1g
spark.driver.maxResultSize          512m

# ── Shuffle ──────────────────────────────────────────────
spark.sql.shuffle.partitions        8
spark.default.parallelism           8

# ── Streaming ────────────────────────────────────────────
spark.streaming.backpressure.enabled    true
spark.streaming.kafka.maxRatePerPartition 1000

# ── SQL / Parquet / ORC ──────────────────────────────────
spark.sql.parquet.compression.codec snappy
spark.sql.orc.compression.codec     snappy
spark.sql.sources.partitionOverwriteMode dynamic

# ── Event Log (for history server) ───────────────────────
spark.eventLog.enabled              true
spark.eventLog.dir                  hdfs://namenode:8020/spark-logs

# ── UI ───────────────────────────────────────────────────
spark.ui.enabled                    true
spark.ui.port                       4040
